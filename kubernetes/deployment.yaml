apiVersion: apps/v1
kind: Deployment
metadata:
  name: meditrack-api
  namespace: meditrack
  labels:
    app: meditrack
spec:
  replicas: 3
  selector:
    matchLabels:
      app: meditrack
  template:
    metadata:
      labels:
        app: meditrack
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: meditrack-api
          image: cmisola/meditrack-api:latest    #Replace with your actual image tag
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: meditrack-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
